id: redis-8-bookworm-docker
name: Redis
version: 8-bookworm
maintainer: Redis
description_short: Redis is an open-source, in-memory data structure store.
description: "Redis an open-source, in-memory data structure store, used as a database,\
  \ \ncache, and message broker. It supports various data structures such as strings,\
  \ \nhashes, lists, sets, sorted sets with range queries, bitmaps, hyperloglogs,\
  \ and \ngeospatial indexes with radius queries. In MLOX, Redis can be used for caching,\
  \ \nsession management, real-time analytics, and as a message queue for distributed\
  \ \nmachine learning tasks, enhancing the performance and scalability of your applications.\n"
links:
  project: https://redis.io/
  news: https://redis.io/
  security: https://redis.io/
  documentation: https://redis.io/
  changelog: https://redis.io/
requirements:
  cpus: 2.0
  ram_gb: 2.0
  disk_gb: 1.0
groups:
  service: null
  database:
    in-memory: null
    nosql: null
  backend:
    docker: null
capabilities:
  service:
  - cache
  - database
  backend:
  - docker
ports:
  service: 6379
build:
  class_name: mlox.services.redis.docker.RedisDockerService
  params:
    name: redis-8-bookworm
    template: ${MLOX_STACKS_PATH}/redis/docker-compose-redis-8-bookworm.yaml
    target_path: ${MLOX_USER_HOME}/redis-8-bookworm
    pw: ${MLOX_AUTO_PW}
    port: ${MLOX_AUTO_PORT_SERVICE}
