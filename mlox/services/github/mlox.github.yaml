id: github-repo-0.1-beta-docker
name: Github Repository
version: 0.1-beta
maintainer: Your Name
description_short: Clone and pull Github Repositories on your servers.
description: 'Clone and pull Github Repositories on your servers. Make your repositories
  accessible for installed services.

  '
links:
  project: https://mlox.org
  documentation: https://github.com/busysloths/mlox/
requirements:
  cpus: 1.0
  ram_gb: 1.0
  disk_gb: 1.0
groups:
  service: null
  resource: null
  git: null
  repository: null
  backend:
    kubernetes: null
    docker: null
    native: null
build:
  class_name: mlox.services.github.service.GithubRepoService
  params:
    name: Github:${GITHUB_LINK}@${MLOX_SERVER_IP}
    template: ${MLOX_STACKS_PATH}/tsm/mlox.github.yaml
    target_path: ${MLOX_USER_HOME}/repos
    link: ${GITHUB_LINK}
    is_private: ${GITHUB_PRIVATE}
