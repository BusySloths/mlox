id: influx-1.11.8-docker
name: InfluxDB
version: 1.11.8
maintainer: Your Name
description_short: InfluxDB is a time-series database designed for high-performance
  data storage and retrieval.
description: "InfluxDB is an open-source time-series database designed for high-performance\
  \ data storage and retrieval. \nIt is optimized for handling large volumes of time-stamped\
  \ data, making it ideal for monitoring, analytics, \nand real-time applications.\
  \ In MLOX, InfluxDB is used to store and query time-series data generated by machine\
  \ \nlearning models, experiments, and system metrics.\n"
links:
  project: https://influxdata.com/products/influxdb/
  news: https://influxdata.com/products/influxdb/
  security: https://influxdata.com/products/influxdb/
  documentation: https://influxdata.com/products/influxdb/
  changelog: https://influxdata.com/products/influxdb/
requirements:
  cpus: 2.0
  ram_gb: 4.0
  disk_gb: 10.0
groups:
  service: null
  database:
    time-series: null
    nosql: null
  backend:
    docker: null
capabilities:
  service:
  - database
  backend:
  - docker
ports:
  web_ui: 8086
build:
  class_name: mlox.services.influx.docker.InfluxDockerService
  params:
    name: influx-1.11.8
    template: ${MLOX_STACKS_PATH}/influx/docker-compose-influx-1.11.8.yaml
    target_path: ${MLOX_USER_HOME}/influx-1.11.8
    user: ${MLOX_AUTO_USER}
    pw: ${MLOX_AUTO_PW}
    port: ${MLOX_AUTO_PORT_WEB_UI}
    token: ${MLOX_AUTO_PW}
