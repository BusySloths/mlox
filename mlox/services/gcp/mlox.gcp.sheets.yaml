id: gcp-sheets-0.1.0
name: GCP Sheets
version: 0.1.0
maintainer: Google Workspace
description_short: Google Spreadsheets is a secure and scalable service for managing
  sheets in Google Cloud Platform.
description: "Google Spreadsheets is a secure and scalable service for managing sheets\
  \ in Google Cloud Platform.\nIt allows users to store, manage, and share information\
  \ and data and is widely used in a business \ncontext to collaborate on documents,\
  \ track projects, and perform data analysis.\nIn MLOX, Google Spreadsheets can be\
  \ used as a data source or sink for various services and applications,\nfacilitating\
  \ data exchange and collaborative workflows.\n"
links:
  project: https://workspace.google.com/intl/en_au/products/sheets/
  news: https://workspace.google.com/ißntl/en_au/products/sheets/
  security: https://workspace.google.com/intl/en_au/products/sheets/
  documentation: https://workspace.google.com/intl/en_au/products/sheets/
  changelog: https://workspace.google.com/intl/en_au/products/sheets/
requirements:
  cpus: 0.0
  ram_gb: 0.0
  disk_gb: 0.0
groups:
  service: null
  cloud:
    gcp: null
  database:
    spreadsheets: null
  backend:
    connector: null
capabilities:
  service:
  - spreadsheet
  backend:
  - connector
build:
  class_name: mlox.services.gcp.sheet_service.GCPSpreadsheetsService
  params:
    name: gcp-sheets-0.1.0
    template: ${MLOX_STACKS_PATH}/gcp/mlox.gcp.sheets.yaml
    target_path: ${MLOX_USER_HOME}/gcp_sheets
    secret_manager_uuid: ${SECRET_MANAGER_UUID}
    secret_name: ${SECRET_NAME}
