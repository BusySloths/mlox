id: milvus-2.5-docker
name: Milvus
version: '2.5'
maintainer: Your Name
description_short: Milvus is an open-source vector database designed for scalable
  similarity search.
description: "Milvus is an open-source vector database designed for scalable similarity\
  \ search and AI applications. \nIt supports high-dimensional vector data and provides\
  \ efficient indexing and querying capabilities. \nIn MLOX, Milvus can be used for\
  \ tasks such as image and text similarity search, recommendation systems, \nand\
  \ other machine learning applications that require fast and scalable vector operations.\n"
links:
  project: https://milvus.io/
  news: https://milvus.io/
  security: https://milvus.io/
  documentation: https://milvus.io/
  changelog: https://milvus.io/
requirements:
  cpus: 2.0
  ram_gb: 4.0
  disk_gb: 10.0
groups:
  service: null
  database:
    vector: null
  backend:
    docker: null
capabilities:
  service:
  - vector_database
  backend:
  - docker
ports:
  service: 19530
build:
  class_name: mlox.services.milvus.docker.MilvusDockerService
  params:
    name: milvus-2.5
    template: ${MLOX_STACKS_PATH}/milvus/docker-compose-milvus-2.5.yaml
    config: ${MLOX_STACKS_PATH}/milvus/milvus.yaml
    target_path: ${MLOX_USER_HOME}/milvus-2.5
    user: ${MLOX_AUTO_USER}
    pw: ${MLOX_AUTO_PW}
    port: ${MLOX_AUTO_PORT_SERVICE}
