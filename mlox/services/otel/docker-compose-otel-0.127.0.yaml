version: '3.8'

services:

  # Collector
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.127.0
    container_name: otel-collector
    restart: always
    environment:
      - MY_OTEL_RELIC_ENDPOINT=${OTEL_RELIC_ENDPOINT}
      - MY_OTEL_RELIC_KEY=${OTEL_RELIC_KEY}
      - MY_OTEL_GRAFANA_ENDPOINT=${OTEL_GRAFANA_ENDPOINT}
      - MY_OTEL_GRAFANA_AUTH=${OTEL_GRAFANA_AUTH}
      - MY_OTEL_INFLUX_ENDPOINT=${OTEL_INFLUX_ENDPOINT}
      - MY_OTEL_INFLUX_TOKEN=${OTEL_INFLUX_TOKEN}
      - MY_OTEL_INFLUX_ORG=${OTEL_INFLUX_ORG}
      - MY_OTEL_INFLUX_BUCKET=${OTEL_INFLUX_BUCKET}
      - MY_OTEL_INFLUX_INSECURE_SKIP_VERIFY=${OTEL_INFLUX_INSECURE_SKIP_VERIFY}
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-data:/etc/otelcol  # fix path to where the file exporter writes
      # - ./otel-data/telemetry.json:/etc/otelcol/telemetry.json # Mount a local directory to where the file exporter writes
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ./cert.pem:/etc/cert.pem
      - ./key.pem:/etc/key.pem
    ports:
      - "${OTEL_PORT_GRPC}:4317"   # OTLP gRPC receiver
      - "${OTEL_PORT_HTTP}:4318"   # OTLP HTTP receiver
      - "${OTEL_PORT_HEALTH}:13133"  # health check
    networks:
      - otel_0_127_0_network

networks:
  otel_0_127_0_network: