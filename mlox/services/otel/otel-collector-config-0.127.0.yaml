  file:
    path: /etc/otelcol/telemetry.json
    rotation:
      max_megabytes: 10
      max_backups: 5
  debug:
    verbosity: detailed

processors:
  batch:
  memory_limiter:
    check_interval: 1s
    limit_percentage: 65
    spike_limit_percentage: 20

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"
    path: "/health/status"
    tls:
      cert_file: /etc/cert.pem
      key_file: /etc/key.pem
    check_collector_pipeline:
      enabled: true
      interval: "5m"
      exporter_failure_threshold: 5

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, memory_limiter]
      exporters: [debug, file__OPTIONAL_EXPORTERS__]
    metrics:
      receivers: [otlp, hostmetrics]
      processors: [batch, memory_limiter]
      exporters: [debug, file__OPTIONAL_EXPORTERS__]
    logs:
      receivers: [otlp]
      processors: [batch, memory_limiter]
      exporters: [debug, file__OPTIONAL_EXPORTERS__]
