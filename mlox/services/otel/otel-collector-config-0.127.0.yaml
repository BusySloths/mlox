receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        tls:
          cert_file: /etc/cert.pem
          key_file: /etc/key.pem
      http:
        endpoint: 0.0.0.0:4318
        tls:
          cert_file: /etc/cert.pem
          key_file: /etc/key.pem

  hostmetrics:
    collection_interval: 60s
    scrapers:
      cpu:
      memory:
      load:
      disk:
      filesystem:
      network:

