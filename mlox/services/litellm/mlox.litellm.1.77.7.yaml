id: litellm-ollama-1.77.7-docker
name: LiteLLM + Ollama
version: 1.77.7 (stable)
maintainer: BerriAI
description_short: LiteLLM is an open-source library that simplifies the integration
  of large language models (LLMs) into applications.
description: "LiteLLM is an open-source library that simplifies the integration of\
  \ large language models (LLMs) into \napplications. It provides a unified API for\
  \ interacting with various LLM providers, making it easier to \nswitch between models\
  \ and manage API keys. In MLOX, LiteLLM is used to provide a flexible and scalable\
  \ \nsolution for integrating LLMs into your machine learning workflows. This stack\
  \ also includes Ollama, a \nlightweight, local LLM serving solution.\n"
links:
  project: https://litellm.vercel.app/
  news: https://litellm.vercel.app/
  security: https://litellm.vercel.app/
  documentation: https://litellm.vercel.app/
  changelog: https://litellm.vercel.app/
requirements:
  cpus: 2.0
  ram_gb: 4.0
  disk_gb: 10.0
groups:
  llm: null
  service: null
  backend:
    docker: null
capabilities:
  service:
  - llm
  - model_server
  backend:
  - docker
ports:
  web_ui: 5222
build:
  class_name: mlox.services.litellm.docker.LiteLLMDockerService
  params:
    name: litellm-ollama-1.77.7
    template: ${MLOX_STACKS_PATH}/litellm/docker-compose-litellm-ollama-1.77.7.yaml
    target_path: ${MLOX_USER_HOME}/litellm-1.77.7
    ollama_script: ${MLOX_STACKS_PATH}/litellm/entrypoint.sh
    litellm_config: ${MLOX_STACKS_PATH}/litellm/litellm-config.yaml
    ui_user: ${MLOX_AUTO_USER}
    ui_pw: ${MLOX_AUTO_PW}
    ui_port: ${MLOX_AUTO_PORT_WEB_UI}
    service_port: '4000'
    slack_webhook: ''
    api_key: ${MLOX_AUTO_API_KEY}
    ollama_models: ${OLLAMA_MODELS}
    openai_key: ${OPENAI_KEY}
