id: openbao-docker
name: OpenBao
version: 2.5.4
maintainer: MLOX Contributors
description_short: OpenBao provides a Vault-compatible secret management server.
description: 'OpenBao is an open-source, Vault-compatible secret manager offering
  a secure key-value store

  and policy engine for managing sensitive information. This stack runs OpenBao
  with integrated Raft storage and mlox-managed initialization/unseal material.

  '
links:
  project: https://openbao.org
  documentation: https://github.com/openbao/openbao
requirements:
  cpus: 1.0
  ram_gb: 1.0
  disk_gb: 1.0
groups:
  service: null
  secret-manager: null
  backend:
    docker: null
ports:
  api: 8200
build:
  class_name: mlox.services.openbao.docker.OpenBaoDockerService
  params:
    name: openbao
    template: ${MLOX_STACKS_PATH}/openbao/docker-compose-openbao.yaml
    target_path: ${MLOX_USER_HOME}/openbao-2.5.4
    port: ${MLOX_AUTO_PORT_API}
    mount_path: secret
