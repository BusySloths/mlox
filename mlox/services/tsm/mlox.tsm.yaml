id: tsm-0.1-beta
name: TinySecretManager (TSM)
version: 0.1-beta
maintainer: Busy Sloths
description_short: TinySecretManager is a lightweight, file-based secret management
  service.
description: "TinySecretManager (TSM) is a lightweight, file-based secret management\
  \ service designed to \nsecurely store and manage sensitive information such as\
  \ API keys, passwords, and configuration \nsettings. It provides a simple interface\
  \ for storing and retrieving secrets, making it easy to \nintegrate into applications\
  \ and workflows. TSM is particularly useful in environments where a \nfull-fledged\
  \ secret management solution is not required, but secure storage of sensitive data\
  \ \nis still necessary.\n"
links:
  project: https://mlox.org
  documentation: https://github.com/busysloths/mlox/
requirements:
  cpus: 1.0
  ram_gb: 1.0
  disk_gb: 1.0
groups:
  service: null
  secret-manager: null
  backend:
    kubernetes: null
    docker: null
    native: null
capabilities:
  service:
  - secret_manager
  backend:
  - kubernetes
  - docker
  - native
build:
  class_name: mlox.services.tsm.service.TSMService
  params:
    name: tsm
    template: ${MLOX_STACKS_PATH}/tsm/mlox.tsm.yaml
    target_path: ${MLOX_USER_HOME}/.secrets
    pw: ${MLOX_AUTO_PW}
    server_uuid: ${MLOX_SERVER_UUID}
