id: postgres-16-bullseye-docker
name: Postgres
version: 16-bullseye
maintainer: PostgreSQL Global Development Group
description_short: Postgres is a powerful, open-source object-relational database
  system.
description: "PostgresSQL is a powerful, open-source object-relational database system\
  \ known for its \nreliability, feature robustness, and performance. It supports\
  \ both SQL (relational) and \nJSON (non-relational) querying. In MLOX, PostgreSQL\
  \ can be used as a backend database for \nvarious services, including MLFlow, Airflow,\
  \ and custom applications, providing a reliable \nand scalable data storage solution\
  \ for machine learning metadata, experiment results, and \noperational data.\n"
links:
  project: https://www.postgresql.org/
  news: https://www.postgresql.org/
  security: https://www.postgresql.org/
  documentation: https://www.postgresql.org/
  changelog: https://www.postgresql.org/
requirements:
  cpus: 2.0
  ram_gb: 4.0
  disk_gb: 10.0
groups:
  service: null
  database:
    relational: null
  backend:
    docker: null
capabilities:
  service:
  - database
  backend:
  - docker
ports:
  service: 5432
build:
  class_name: mlox.services.postgres.docker.PostgresDockerService
  params:
    name: postgres-16-bullseye
    template: ${MLOX_STACKS_PATH}/postgres/docker-compose-postgres-16.yaml
    target_path: ${MLOX_USER_HOME}/postgres-16-bullseye
    user: ${MLOX_AUTO_USER}
    pw: ${MLOX_AUTO_PW}
    db: ${POSTGRES_DB}
    port: ${MLOX_AUTO_PORT_SERVICE}
