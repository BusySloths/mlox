id: mlflow-gateway-3.8.1-docker
name: MLFlow Gateway
version: 3.8.1
maintainer: Your Name
description_short: Lightweight multi-model HTTP gateway for MLflow registry models.
description: Provides a simple authenticated HTTPS endpoint that loads MLflow pyfunc
  models dynamically from a configured MLflow registry and caches them for repeated
  predictions. It is intended as a flexible lightweight complement to MLServer for
  exploration, internal tooling, and lower-criticality model access.
links:
  project: https://mlflow.org/
  news: https://mlflow.org/releases/
  security: https://mlflow.org/docs/latest/security.html
  documentation: https://mlflow.org/docs/latest/index.html
  changelog: https://mlflow.org/docs/latest/changelog.html
requirements:
  cpus: 1.0
  ram_gb: 2.0
  disk_gb: 1.0
groups:
  service: null
  model-server: null
  backend:
    docker: null
capabilities:
  service:
  - model_server
  backend:
  - docker
ports:
  rest: 6433
build:
  class_name: mlox.services.mlflow_gateway.docker.MLFlowGatewayDockerService
  params:
    name: mlflow-gateway-3.8.1
    template: ${MLOX_STACKS_PATH}/mlflow_gateway/docker-compose-mlflow-gateway-3.8.1.yaml
    dockerfile: ${MLOX_STACKS_PATH}/mlflow_gateway/dockerfile-mlflow-gateway-3.8.1
    serve_script: ${MLOX_STACKS_PATH}/mlflow_gateway/serve.py
    start_script: ${MLOX_STACKS_PATH}/mlflow_gateway/start_gateway.sh
    target_path: ${MLOX_USER_HOME}/mlflow-gateway-3.8.1
    port: ${MLOX_AUTO_PORT_REST}
    tracking_uri: ${TRACKING_URI}
    tracking_user: ${TRACKING_USER}
    tracking_pw: ${TRACKING_PW}
    requirements_txt: ${GATEWAY_REQUIREMENTS_TXT}
    cache_max_models: ${GATEWAY_CACHE_MAX_MODELS}
    cache_ttl_days: ${GATEWAY_CACHE_TTL_DAYS}
    user: ${MLOX_AUTO_USER}
    pw: ${MLOX_AUTO_PW}
    registry_uuid: ${MODEL_REGISTRY_UUID}
